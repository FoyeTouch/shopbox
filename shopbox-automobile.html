<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Shopbox — Automobiles Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --gold:        #F5A623;
      --gold-bright: #FFB930;
      --gold-dark:   #C47F0A;
      --gold-muted:  rgba(245,166,35,0.13);
      --gold-glow:   rgba(245,166,35,0.35);
      --bg-base:     #0D0D0D;
      --bg-card:     #161616;
      --bg-card-2:   #1C1C1C;
      --border:      rgba(255,255,255,0.07);
      --border-gold: rgba(245,166,35,0.3);
      --text-primary:#FFFFFF;
      --text-secondary:#A0A0A0;
      --text-muted:  #555;
      --font-display:'Syne', sans-serif;
      --font-body:   'DM Sans', sans-serif;
      --px:          16px;
      --radius-lg:   20px;
      --radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px var(--px);
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════
       PAGE WRAPPER — shows card in context
    ══════════════════════════════════════ */
    .demo-wrap {
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .demo-label {
      font-size: 11px; color: var(--text-muted);
      text-align: center; letter-spacing: .08em;
      text-transform: uppercase;
      font-family: var(--font-display);
    }

    /* ══════════════════════════════════════
       AUTOMOBILE COMING SOON CARD
    ══════════════════════════════════════ */
    .auto-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease;

      /* Transparent gold background */
      background: linear-gradient(
        135deg,
        rgba(245,166,35,0.18) 0%,
        rgba(245,166,35,0.08) 40%,
        rgba(245,166,35,0.14) 100%
      );
      border: 1.5px solid rgba(245,166,35,0.28);
      box-shadow:
        0 8px 40px rgba(245,166,35,0.12),
        inset 0 1px 0 rgba(255,255,255,0.06);

      padding: 28px 20px 22px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .auto-card:active {
      transform: scale(0.98);
    }

    /* Noise texture overlay */
    .auto-card::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
      opacity: .5;
    }

    /* Radial glow top-right */
    .auto-card::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(245,166,35,0.2) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none; z-index: 0;
    }

    /* ── Top row: badge + notify ── */
    .card-top {
      display: flex; align-items: center;
      justify-content: space-between;
      position: relative; z-index: 2;
      margin-bottom: 14px;
    }

    .auto-badge {
      display: flex; align-items: center; gap: 7px;
      background: rgba(13,13,13,0.55);
      border: 1px solid rgba(245,166,35,0.35);
      backdrop-filter: blur(6px);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      color: var(--gold);
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .auto-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: badgePulse 1.8s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.7); }
    }

    .notify-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(245,166,35,0.15);
      border: 1px solid rgba(245,166,35,0.3);
      color: var(--gold);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: background .2s, transform .15s;
      backdrop-filter: blur(6px);
    }
    .notify-btn:active { background: rgba(245,166,35,0.28); transform: scale(0.95); }
    .notify-btn i { font-size: 10px; }

    /* ── Cars SVG area ── */
    .cars-wrap {
      position: relative; z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
      margin: 0 -8px 10px;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
    }

    /* Individual car containers */
    .car {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: transform .3s ease;
    }
    .car:nth-child(1) {
      transform: translateX(12px) scale(0.82);
      opacity: .7;
      z-index: 1;
    }
    .car:nth-child(2) {
      transform: translateY(-6px) scale(1);
      z-index: 3;
      opacity: 1;
    }
    .car:nth-child(3) {
      transform: translateX(-12px) scale(0.82);
      opacity: .7;
      z-index: 1;
    }
    .auto-card:hover .car:nth-child(1) { transform: translateX(18px) scale(0.85); }
    .auto-card:hover .car:nth-child(3) { transform: translateX(-18px) scale(0.85); }

    .car svg { width: 100%; max-width: 160px; height: auto; }

    /* Gold reflection line under cars */
    .car-ground {
      position: relative; z-index: 2;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,166,35,0.4), transparent);
      margin: 0 20px 16px;
    }
    .car-ground::before {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 8px;
      background: radial-gradient(ellipse, rgba(245,166,35,0.2) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* ── Bottom text ── */
    .card-bottom {
      position: relative; z-index: 2;
      text-align: center;
    }

    .coming-soon-text {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 800;
      line-height: 1.1;
      margin-bottom: 5px;

      /* Gold shimmer */
      background: linear-gradient(90deg,
        var(--gold-dark) 0%,
        var(--gold-bright) 40%,
        #fff 50%,
        var(--gold-bright) 60%,
        var(--gold-dark) 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShimmer 3s linear infinite;
    }
    @keyframes goldShimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    .card-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      font-weight: 400;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 14px;
      position: relative; z-index: 2;
    }
    .progress-header {
      display: flex; align-items: center;
      justify-content: space-between;
      font-size: 10px; color: rgba(255,255,255,0.4);
      font-family: var(--font-display); font-weight: 600;
      margin-bottom: 6px; letter-spacing: .04em;
    }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 35%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-bright));
      border-radius: 99px;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute; right: 0; top: 50%;
      transform: translateY(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-bright);
      box-shadow: 0 0 6px var(--gold-glow);
    }

    /* ══════════════════════════════════════
       HOMEPAGE SECTION CONTEXT
       (shows how card fits on homepage)
    ══════════════════════════════════════ */
    .section-header {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 700;
    }
    .section-sub {
      font-size: 12px; color: var(--text-muted);
      margin-top: 2px;
    }

    /* Notify toast */
    .toast {
      position: fixed; bottom: 32px;
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1C1C1C;
      border: 1px solid rgba(245,166,35,0.4);
      color: #fff; font-size: 13px; font-weight: 500;
      font-family: var(--font-body);
      padding: 10px 22px; border-radius: var(--radius-pill);
      opacity: 0; transition: all .3s ease;
      z-index: 9999; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Animations */
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
    .fu { animation: fadeUp .4s ease both; }
    .d1 { animation-delay: .06s; }
    .d2 { animation-delay: .14s; }

  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared-auth.js"></script>
</head>
<body>

<div class="demo-wrap">

  <p class="demo-label">Homepage — Automobiles Section</p>

  <!-- Section header (as it appears on homepage) -->
  <div class="section-header fu d1">
    <div>
      <div class="section-title">Automobiles</div>
      <div class="section-sub">Cars, SUVs, Trucks & more</div>

  </div>

  <!-- ══ THE AUTOMOBILE COMING SOON CARD ══ -->
  <div class="auto-card fu d2" onclick="notifyMe()">

    <!-- Top row -->

      <div class="auto-badge">
        <div class="auto-badge-dot"></div>
        New Category
      </div>
      <button class="notify-btn" onclick="notifyMe(); event.stopPropagation();">

      </button>
    </div>

    <!-- 3 Cars SVG -->
    <div class="cars-wrap">

      <!-- Car 1: Sedan (left) -->

          <circle cx="55" cy="68" r="7" fill="none" stroke="rgba(245,166,35,0.4)" stroke-width="1.5"/>

          <circle cx="145" cy="68" r="2" fill="rgba(245,166,35,0.5)"/>
          <!-- Headlight -->
          <ellipse cx="178" cy="48" rx="5" ry="4" fill="rgba(245,166,35,0.5)"/>
          <!-- Taillight -->
          <ellipse cx="20" cy="48" rx="4" ry="4" fill="rgba(239,68,68,0.5)"/>
          <!-- Door line -->
          <line x1="100" y1="20" x2="100" y2="60" stroke="rgba(245,166,35,0.2)" stroke-width="1"/>
        </svg>
      </div>

      <!-- Car 2: SUV (center — featured) -->
      <div class="car">
        <svg viewBox="0 0 220 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Body -->
          <path d="M15 68 L28 38 Q40 20 68 16 L152 16 Q178 16 190 38 L205 68 L15 68Z"

          <path d="M52 37 L58 16 L162 16 L168 37Z"

          <!-- Windows -->
          <path d="M58 36 L64 18 L100 18 L100 36Z" fill="rgba(255,255,255,0.12)" stroke="rgba(245,166,35,0.4)" stroke-width="1.2"/>
          <path d="M104 36 L104 18 L156 18 L162 36Z" fill="rgba(255,255,255,0.12)" stroke="rgba(245,166,35,0.4)" stroke-width="1.2"/>
          <!-- Roof rack -->
          <rect x="60" y="13" width="100" height="4" rx="2" fill="rgba(245,166,35,0.3)" stroke="rgba(245,166,35,0.5)" stroke-width="1"/>
          <rect x="75" y="10" width="3" height="7" rx="1" fill="rgba(245,166,35,0.4)"/>
          <rect x="110" y="10" width="3" height="7" rx="1" fill="rgba(245,166,35,0.4)"/>
          <rect x="145" y="10" width="3" height="7" rx="1" fill="rgba(245,166,35,0.4)"/>
          <!-- Bottom chassis -->
          <rect x="10" y="65" width="200" height="10" rx="3" fill="rgba(245,166,35,0.25)" stroke="rgba(245,166,35,0.5)" stroke-width="1.5"/>
          <!-- Wheels (bigger for SUV) -->
          <circle cx="58" cy="76" r="17" fill="rgba(13,13,13,0.9)" stroke="rgba(245,166,35,0.8)" stroke-width="2.5"/>
          <circle cx="58" cy="76" r="9" fill="none" stroke="rgba(245,166,35,0.5)" stroke-width="2"/>
          <circle cx="58" cy="76" r="3" fill="rgba(245,166,35,0.7)"/>
          <!-- Wheel spokes -->
          <line x1="58" y1="67" x2="58" y2="85" stroke="rgba(245,166,35,0.35)" stroke-width="1.2"/>
          <line x1="49" y1="76" x2="67" y2="76" stroke="rgba(245,166,35,0.35)" stroke-width="1.2"/>
          <line x1="52" y1="69" x2="64" y2="83" stroke="rgba(245,166,35,0.35)" stroke-width="1.2"/>
          <line x1="64" y1="69" x2="52" y2="83" stroke="rgba(245,166,35,0.35)" stroke-width="1.2"/>

          <circle cx="162" cy="76" r="17" fill="rgba(13,13,13,0.9)" stroke="rgba(245,166,35,0.8)" stroke-width="2.5"/>
          <circle cx="162" cy="76" r="9" fill="none" stroke="rgba(245,166,35,0.5)" stroke-width="2"/>
          <circle cx="162" cy="76" r="3" fill="rgba(245,166,35,0.7)"/>

          <!-- Door lines -->
          <line x1="100" y1="18" x2="100" y2="68" stroke="rgba(245,166,35,0.25)" stroke-width="1.2"/>
          <!-- Door handles -->
          <rect x="80" y="44" width="14" height="3" rx="1.5" fill="rgba(245,166,35,0.4)"/>
          <rect x="112" y="44" width="14" height="3" rx="1.5" fill="rgba(245,166,35,0.4)"/>

      </div>

      <!-- Car 3: Sports coupe (right) -->
      <div class="car">
        <svg viewBox="0 0 200 85" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Ground line -->

    <!-- Bottom text -->
    <div class="card-bottom">
      <div class="coming-soon-text">Automobiles — Coming Soon</div>
      <div class="card-sub">
        Buy, sell &amp; finance cars, SUVs and trucks.<br>
        We're building something incredible for you.
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-header">
          <span>Development Progress</span>
          <span>35%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
      </div>
    </div>

  </div><!-- /auto-card -->

  <p class="demo-label" style="margin-top:4px;">Tap the card or "Notify Me" to register interest</p>

</div><!-- /demo-wrap -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let notified = false;
  function notifyMe() {
    if (notified) {
      showToast('✅ You\'re already on the list!');
      return;
    }
    notified = true;
    showToast('🔔 We\'ll notify you when Automobiles launches!');
    document.querySelector('.notify-btn').innerHTML =
      '<i class="fa-solid fa-check"></i> Notified!';
    document.querySelector('.notify-btn').style.background = 'rgba(34,197,94,0.2)';
    document.querySelector('.notify-btn').style.borderColor = 'rgba(34,197,94,0.4)';
    document.querySelector('.notify-btn').style.color = '#22C55E';
  }

  function showToast(msg, dur = 2800) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }
</script>

</body>
</html>
